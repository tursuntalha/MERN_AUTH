version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: authforge-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: authforge

  redis:
    image: redis:7-alpine
    container_name: authforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./backend
    container_name: authforge-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/authforge
      - REDIS_HOST=redis
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis

  client:
    build: ./frontend
    container_name: authforge-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:4000
    depends_on:
      - api

volumes:
  mongo_data:
  redis_data:
